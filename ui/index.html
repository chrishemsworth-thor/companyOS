<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompanyOS Operator Console</title>
    <!-- Favicon: the "C" logomark inverted from the landing page (white
         rounded square, near-black C) as an inline SVG data URI. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='13' fill='%23ffffff'/%3E%3Ctext x='32' y='45.5' font-family='-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif' font-size='38' font-weight='700' fill='%2316181d' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E"
    />
    <script>
      // Stamp the resolved theme before first paint so a stored dark/light
      // preference doesn't flash the other palette. Mirrors src/lib/theme.ts
      // (storage key + resolution rules) — keep the two in sync.
      (function () {
        var stored = localStorage.getItem("companyos_theme");
        var pref = stored === "light" || stored === "dark" ? stored : "system";
        document.documentElement.dataset.theme =
          pref === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : pref;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
